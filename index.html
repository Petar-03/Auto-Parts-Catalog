<!DOCTYPE html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto Parts Catalog</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <a href="#">
        <img
          class="logo"
          src="img/logo.png"
          alt="Логото на Auto Parts Catalog"
        />
      </a>
      <nav class="nav">
        <ul class="nav-list">
          <li>
            <a href="#" class="nav-list-item">Начало</a>
          </li>
          <li>
            <a href="#" class="nav-list-item">Продукти</a>
          </li>
          <li>
            <a href="#" class="nav-list-item">Контакти</a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="hero-section">
        <div class="hero-content-box">
          <h1>AutoParts <span>Catalog</span></h1>
          <p>Открийте качествени авточасти на достъпни цени.</p>
          <a href="#"
            >Разгледайте продуктите <i class="bi bi-arrow-right"></i>
          </a>
        </div>
        <div class="img-box">
          <img
            src="img/hero-img.png"
            alt="Част от нашето разнообразие от авточасти"
          />
        </div>
      </section>
      <section class="offers-section">
        <div
          id="carouselExample"
          class="carousel slide"
          data-bs-ride="carousel"
          data-bs-interval="5000"
        >
          <div class="carousel-inner">
            <div class="carousel-item active">
              <div class="offer-slide">
                <div class="offer-card">
                  <i class="bi bi-truck"></i>
                  <div>
                    <h3>Безплатна доставка</h3>
                    <p>При поръчка над 100 евро.</p>
                  </div>
                </div>
              </div>
            </div>

            <div class="carousel-item">
              <div class="offer-slide">
                <div class="offer-card">
                  <i class="bi bi-tag"></i>
                  <div>
                    <h3>Специални оферти</h3>
                    <p>Намаления до -20% на избрани продукти.</p>
                  </div>
                </div>
              </div>
            </div>

            <div class="carousel-item">
              <div class="offer-slide">
                <div class="offer-card">
                  <i class="bi bi-shield-check"></i>
                  <div>
                    <h3>Гарантирано качество</h3>
                    <p>Само доказани марки и надеждни продукти.</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <button
            class="carousel-control-prev"
            type="button"
            data-bs-target="#carouselExample"
            data-bs-slide="prev"
          >
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>

          <button
            class="carousel-control-next"
            type="button"
            data-bs-target="#carouselExample"
            data-bs-slide="next"
          >
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>
      </section>
      <section class="products-section">
        <div class="filter-buttons">
          <button class="filter-btn" product-brand="all">Всички</button>
          <button class="filter-btn" product-brand="bmw">BMW</button>
          <button class="filter-btn" product-brand="mercedes">Mercedes</button>
          <button class="filter-btn" product-brand="audi">Audi</button>
          <button class="filter-btn" product-brand="subaru">Subaru</button>
          <button class="filter-btn" product-brand="toyota">Toyota</button>
        </div>
        <div class="products-grid"></div>
      </section>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="index.js"></script>
  </body>
</html>
