<!DOCTYPE html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto Parts Catalog</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <a href="#">
        <img
          class="logo"
          src="img/logo.png"
          alt="Логото на Auto Parts Catalog"
        />
      </a>
      <nav class="nav">
        <ul class="nav-list">
          <li>
            <a href="#" class="nav-list-item">Начало</a>
          </li>
          <li>
            <a href="#" class="nav-list-item">Продукти</a>
          </li>
          <li>
            <a href="#" class="nav-list-item">Контакти</a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="hero-section">
        <div class="hero-content-box">
          <h1>AutoParts <span>Catalog</span></h1>
          <p>Открийте качествени авточасти на достъпни цени.</p>
          <a href="#"
            >Разгледайте продуктите <i class="bi bi-arrow-right"></i>
          </a>
        </div>
        <div class="img-box">
          <img
            src="img/hero-img.png"
            alt="Част от нашето разнообразие от авточасти"
          />
        </div>
      </section>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
